DATA_CREATION_CONFIG:
  each_relation_num2gen: 10 # 360 equals to 1 hour
  audio_length: 10 # seconds
  audio_sr: 16000 # Hz
  save_dir: gen_data_train
  seed_audio_path: /datadisk/aurelius # path where seed_audio lies
  loudness_reduction_ratio: 0.1
  ensure_nonoverlapping: true
  random_seed: 200 # 200 for train data
  mainrel2create: ['Count', 'Temporality', 'Spatiality', 'Perceptuality', 'Compositionality', 'Nested_Combination']
  exclude_event_ids: []
  save_name: audiorelgen_train.json
  Count_Config:
    min_count: 2
    max_count: 5
  Temporality_Config:
    max_count: 2
    min_count: 2
    max_audio_len: 5
    min_audio_len: 1
    inter_source: true
    inter_audio: true
  Spatiality_Config:
    inter_source: true
    inter_audio: true
    loudness_reduction_ratio: 0.1
    proximity_reduction_min_ratio: 0.8
    motion_volume_type: 'exponential'
  Perceptuality_Config:
    balancing_increase_ratio: 1.3
    balancing_decrease_ratio: 0.1
    timestretch_ratio: 5.0 # need > 1.
    amplification_ratio: 2.0 # need > 1.
    attenuation_ratio: 0.1 # need < 1.
    reverb_rir_path: reverb_rir.npy
  Compositionality_Config:
    max_count: 3
    min_count: 2
    max_audio_len: 5
    min_audio_len: 1
    inter_source: true
    inter_audio: true
  NestedCombination_Config:
    max_count: 3
    min_count: 2
    max_audio_len: 5
    min_audio_len: 1
    inter_source: true
    inter_audio: true
AudioEvent_Corpus: ../AudioEventSet.json
AudioRelation_Corpus: ../AudioRelSet.json